{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}
  {{ page_title }}
{% endblock %}

{% block content %}
  <h1 class="mb-4">
    {{ page_title }}
  </h1>

  <form method="post">
    {% csrf_token %}

    {% bootstrap_form form %}

    <button
      type="submit"
      class="btn btn-primary"
    >
      {{ button_text }}
    </button>
  </form>
{% endblock %}
