{% extends "base.html" %}

{% block title %}
  Метки
{% endblock %}

{% block content %}
  <h1 class="mb-4">
    Метки
  </h1>

  <a
    class="btn btn-primary mb-3"
    href="{% url 'labels:create' %}"
  >
    Создать метку
  </a>

  <div class="table-responsive">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Имя</th>
          <th>Дата создания</th>
          <th></th>
        </tr>
      </thead>

      <tbody>
        {% for label in labels %}
          <tr>
            <td>
              {{ label.id }}
            </td>

            <td>
              {{ label.name }}
            </td>

            <td>
              {{ label.created_at|date:"d.m.Y H:i" }}
            </td>

            <td>
              <a href="{% url 'labels:update' label.pk %}">
                Изменить
              </a>

              <br>

              <a href="{% url 'labels:delete' label.pk %}">
                Удалить
              </a>
            </td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="4">
              Метки не найдены
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
