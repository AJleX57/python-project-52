{% extends "base.html" %}

{% block title %}
  Удаление пользователя
{% endblock %}

{% block content %}
  <h1 class="mb-4">
    Удаление пользователя
  </h1>

  <p>
    Вы уверены, что хотите удалить
    {{ object.first_name }}
    {{ object.last_name }}?
  </p>

  <form method="post">
    {% csrf_token %}

    <button
      type="submit"
      class="btn btn-danger"
    >
      Да, удалить
    </button>
  </form>
{% endblock %}
